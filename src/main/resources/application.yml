spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=wbsscaff;encrypt=false;trustServerCertificate=true
    username: sa
    password: ${MSSQL_SA_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
    show-sql: false
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
  thymeleaf:
    cache: false
server:
  port: 8080
logging:
  level:
    com.wbsscaff: INFO
