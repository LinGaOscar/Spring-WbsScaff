<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
  <meta charset="UTF-8"><title>主模板管理</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>
  <div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content" id="app">
      <div class="page-header">
        <h2>主模板管理</h2>
      </div>
      <div v-if="error" class="alert alert-error">{{ error }}</div>

      <table class="data-table" v-if="templates.length">
        <thead><tr><th>名稱</th><th>說明</th><th>節點數</th></tr></thead>
        <tbody>
          <tr v-for="t in templates" :key="t.id">
            <td>{{ t.name }}</td>
            <td>{{ t.description || '-' }}</td>
            <td>{{ t.nodeCount ?? '-' }}</td>
          </tr>
        </tbody>
      </table>
      <p v-else style="color:#636e72">尚無系統模板。</p>

      <p style="margin-top:1.5rem;font-size:0.85rem;color:#636e72">
        系統模板由管理員透過資料庫維護。自訂快速子項請至「子模板管理」。
      </p>
    </main>
  </div>
  <div th:replace="~{fragments/footer :: footer}"></div>

  <script th:src="@{/js/vue.global.prod.min.js}"></script>
  <script th:inline="javascript">
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    const CSRF_TOKEN  = /*[[${_csrf.token}]]*/ '';
  </script>
  <script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
      setup() {
        const templates = ref([]);
        const error = ref('');

        async function load() {
          const d = await fetch('/api/templates').then(r => r.json());
          if (d.success) templates.value = d.data.system || [];
          else error.value = '載入失敗';
        }

        onMounted(load);
        return { templates, error };
      }
    }).mount('#app');
  </script>
</body>
</html>
