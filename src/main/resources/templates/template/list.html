<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
  <meta charset="UTF-8"><title>主模板管理</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <style>
    .tpl-card { background:#fff; border-radius:8px; padding:1rem 1.25rem; margin-bottom:0.75rem; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
    .tpl-card-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .tpl-card-name { font-weight:600; font-size:1rem; }
    .tpl-card-desc { font-size:0.85rem; color:#636e72; margin-top:0.2rem; }
    .tpl-preview { margin-top:0.75rem; border-top:1px solid #f0f0f0; padding-top:0.75rem; }
    .tpl-node { font-size:0.85rem; padding:0.25rem 0; color:#2d3436; }
    .tpl-node-root { font-weight:600; color:#0984e3; margin-top:0.4rem; }
    .tpl-node-child { padding-left:1.5rem; color:#636e72; }
    .tpl-toggle { font-size:0.75rem; color:#b2bec3; }
  </style>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>
  <div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content" id="app">
      <div class="page-header">
        <h2>主模板管理</h2>
      </div>
      <div v-if="error" class="alert alert-error">{{ error }}</div>

      <!-- 系統模板 -->
      <h3 style="font-size:0.85rem;color:#b2bec3;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem">系統模板</h3>
      <p v-if="!systemTpls.length" style="color:#636e72;margin-bottom:1rem">尚無系統模板。</p>
      <div v-for="t in systemTpls" :key="t.id" class="tpl-card">
        <div class="tpl-card-header" @click="togglePreview(t.id)">
          <div>
            <div class="tpl-card-name">{{ t.name }}</div>
            <div class="tpl-card-desc" v-if="t.description">{{ t.description }}</div>
          </div>
          <span class="tpl-toggle">{{ expanded.has(t.id) ? '▲ 收合' : '▼ 預覽節點' }}</span>
        </div>
        <div v-if="expanded.has(t.id)" class="tpl-preview">
          <div v-if="!previewData[t.id]" style="color:#b2bec3;font-size:0.85rem">載入中...</div>
          <template v-else>
            <div v-for="node in previewData[t.id]" :key="node.id"
                 :class="node.parentId ? 'tpl-node tpl-node-child' : 'tpl-node tpl-node-root'">
              {{ node.parentId ? '└ ' : '' }}{{ node.title }}
            </div>
          </template>
        </div>
      </div>

      <!-- 自訂模板 -->
      <h3 style="font-size:0.85rem;color:#b2bec3;text-transform:uppercase;letter-spacing:0.06em;margin:1.5rem 0 0.75rem">自訂模板（從專案另存）</h3>
      <p v-if="!customTpls.length" style="color:#636e72;margin-bottom:1rem">尚無自訂模板，可在專案 WBS 頁點選「另存為模板」建立。</p>
      <div v-for="t in customTpls" :key="t.id" class="tpl-card">
        <div class="tpl-card-header" @click="togglePreview(t.id)">
          <div>
            <div class="tpl-card-name">{{ t.name }}</div>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem" @click.stop>
            <span class="tpl-toggle" style="cursor:pointer" @click="togglePreview(t.id)">
              {{ expanded.has(t.id) ? '▲ 收合' : '▼ 預覽節點' }}
            </span>
            <button class="btn btn-sm" @click="renameTemplate(t)">改名</button>
            <button class="btn btn-sm btn-danger" @click="deleteTemplate(t)">刪除</button>
          </div>
        </div>
        <div v-if="expanded.has(t.id)" class="tpl-preview">
          <div v-if="!previewData[t.id]" style="color:#b2bec3;font-size:0.85rem">載入中...</div>
          <template v-else>
            <div v-for="node in previewData[t.id]" :key="node.id"
                 :class="node.parentId ? 'tpl-node tpl-node-child' : 'tpl-node tpl-node-root'">
              {{ node.parentId ? '└ ' : '' }}{{ node.title }}
            </div>
          </template>
        </div>
      </div>

      <p style="margin-top:1.5rem;font-size:0.82rem;color:#b2bec3">
        系統模板由管理員透過資料庫維護。自訂快速子項請至「子模板管理」。
      </p>
    </main>
  </div>
  <div th:replace="~{fragments/footer :: footer}"></div>

  <script th:src="@{/js/vue.global.prod.min.js}"></script>
  <script th:inline="javascript">
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    const CSRF_TOKEN  = /*[[${_csrf.token}]]*/ '';
  </script>
  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue;
    const h   = () => ({ 'Content-Type':'application/json', [CSRF_HEADER]:CSRF_TOKEN });
    const api = (url, opt={}) => fetch(url, { headers: h(), ...opt }).then(r => r.json());

    createApp({
      setup() {
        const allTemplates = ref({ system: [], custom: [] });
        const expanded     = ref(new Set());
        const previewData  = reactive({});
        const error        = ref('');

        const systemTpls = computed(() => allTemplates.value.system || []);
        const customTpls = computed(() => allTemplates.value.custom || []);

        async function load() {
          const d = await api('/api/templates');
          if (d.success) allTemplates.value = d.data;
          else error.value = '載入失敗';
        }

        async function togglePreview(id) {
          const s = new Set(expanded.value);
          if (s.has(id)) {
            s.delete(id);
          } else {
            s.add(id);
            if (!previewData[id]) {
              const d = await api(`/api/templates/${id}`);
              if (d.success) previewData[id] = d.data.nodes || [];
            }
          }
          expanded.value = s;
        }

        async function renameTemplate(t) {
          const name = prompt('新名稱', t.name);
          if (!name || name === t.name) return;
          const d = await api(`/api/templates/${t.id}`, {
            method: 'PUT',
            body: JSON.stringify({ name, description: t.description })
          });
          if (d.success) load();
          else alert('改名失敗：' + (d.message || ''));
        }

        async function deleteTemplate(t) {
          if (!confirm(`確定刪除模板「${t.name}」？`)) return;
          const d = await api(`/api/templates/${t.id}`, { method: 'DELETE' });
          if (d.success) load();
          else alert('刪除失敗：' + (d.message || ''));
        }

        onMounted(load);
        return { systemTpls, customTpls, expanded, previewData, error,
                 togglePreview, renameTemplate, deleteTemplate };
      }
    }).mount('#app');
  </script>
</body>
</html>
