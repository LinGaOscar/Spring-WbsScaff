<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
  <meta charset="UTF-8"><title>WBS 編輯器</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <link rel="stylesheet" th:href="@{/css/wbs.css}">
  <script th:src="@{/js/sockjs.min.js}"></script>
  <script th:src="@{/js/stomp.min.js}"></script>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <!-- 行動版封鎖：純 CSS，螢幕寬 < 992px 自動顯示 -->
  <div class="mobile-block">
    <div style="font-size:3rem;margin-bottom:1rem">🖥️</div>
    <h2 style="margin-bottom:0.5rem">請使用桌面瀏覽器</h2>
    <p style="color:#636e72;max-width:320px">WBS 編輯器需要較大的螢幕空間，請在電腦上開啟此頁面。</p>
  </div>

  <div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Vue App 包含快速面板 + 主編輯區 -->
    <div id="app" class="wbs-editor-wrap">

      <!-- 左側快速子項面板：只在可編輯時顯示 -->
      <aside class="quick-panel" :class="{collapsed: panelCollapsed}"
             v-show="!locked && !isReadOnly">
        <button class="panel-toggle-btn" @click="panelCollapsed=!panelCollapsed"
                :title="panelCollapsed ? '展開快速子項' : '收合面板'">
          <span>{{ panelCollapsed ? '▶' : '◀' }}</span>
        </button>
        <div class="panel-body" v-show="!panelCollapsed">
          <div class="panel-title">快速子項</div>
          <div v-for="item in quickItems" :key="item.id"
               class="quick-item"
               draggable="true"
               @dragstart="onDragStart($event, item.title)"
               :title="'拖曳至節點插入子項：' + item.title">
            <span class="quick-item-icon">⊕</span>{{ item.title }}
          </div>
          <p v-if="!quickItems.length" class="panel-empty">尚無快速子項</p>
          <p class="panel-hint">拖曳至節點 → 新增為子節點<br>拖曳至空白區 → 新增為根節點</p>
        </div>
      </aside>

      <!-- 主編輯區 -->
      <main class="wbs-main">
        <div class="wbs-toolbar">
          <h2>{{ projectName }}</h2>
          <div class="presence-bar">
            <div class="presence-avatar" v-for="u in onlineUsers" :key="u.userId"
                 :style="{background: u.color}" :title="u.displayName">
              {{ u.displayName[0] }}
            </div>
          </div>
          <div class="wbs-actions">
            <!-- 歸檔唯讀：不顯示鎖定切換，只顯示已歸檔標記 -->
            <template v-if="isReadOnly">
              <span style="font-size:0.82rem;color:#636e72;padding:0.3rem 0.6rem;background:#f0f0f0;border-radius:4px;">📦 已歸檔（唯讀）</span>
            </template>
            <template v-else>
              <button class="btn btn-sm" :class="locked ? 'btn-locked' : 'btn-editing'"
                      @click="locked=!locked" :title="locked ? '點擊解除鎖定' : '點擊鎖定，防止誤操作'">
                {{ locked ? '🔒 鎖定' : '🔓 編輯中' }}
              </button>
            </template>
            <template v-if="!locked && !isReadOnly">
              <button class="btn btn-sm" @click="addRoot">+ 新增大項</button>
              <button class="btn btn-sm" @click="showTemplateModal=true" v-if="!hasNodes">套用模板</button>
              <button class="btn btn-sm" :class="deleteMode ? 'btn-delete-active' : ''"
                      @click="deleteMode=!deleteMode">🗑 刪除模式</button>
              <button class="btn btn-sm" @click="saveAsTemplate">另存為模板</button>
              <button class="btn btn-sm" :class="hasPending ? 'btn-unsaved' : ''"
                      @click="saveAll">{{ hasPending ? '💾 儲存*' : '儲存' }}</button>
            </template>
            <div class="export-dropdown">
              <button class="btn btn-sm">匯出 ▾</button>
              <div class="dropdown-menu">
                <button class="dropdown-item" @click="exportCsv()">CSV</button>
                <button class="dropdown-item" @click="exportXlsx()">XLSX</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 搜尋 / 展開收合 / 狀態篩選 -->
        <div class="wbs-view-bar" v-if="hasNodes">
          <input type="text" v-model="searchQuery" placeholder="🔍 搜尋節點…" class="wbs-search-input" />
          <button class="btn btn-sm" @click="expandAll" title="全展開">全展開</button>
          <button class="btn btn-sm" @click="collapseAll" title="全收合">全收合</button>
          <select v-if="!isReadOnly" v-model="statusFilter" class="wbs-status-filter">
            <option value="ALL">全部狀態</option>
            <option value="NOT_STARTED">未開始</option>
            <option value="IN_PROGRESS">進行中</option>
            <option value="DONE">已完成</option>
          </select>
          <span v-if="searchQuery.trim() || statusFilter !== 'ALL'" class="wbs-filter-hint">
            找到 {{ roots.length }} 個項目
          </span>
          <button v-if="searchQuery.trim() || statusFilter !== 'ALL'"
                  class="btn btn-sm wbs-clear-btn"
                  @click="searchQuery=''; statusFilter='ALL'">✕ 清除</button>
        </div>

        <!-- WBS 樹：同時作為根節點的 drop zone -->
        <div class="wbs-tree"
             @dragover.prevent="treeHighlight=!locked"
             @dragleave="treeHighlight=false"
             @drop="onDropToRoot"
             :class="{'drag-over': treeHighlight}"
             v-if="roots.length">
          <wbs-node v-for="n in roots" :key="n.id" :node="n" :locked="locked" :depth="1" :delete-mode="deleteMode"
                    @add-child="addChild"
                    @delete="deleteNode"
                    @update="updateNode"
                    @cursor-move="sendCursor"
                    @drop-item="handleDropItem"></wbs-node>
        </div>

        <!-- 空狀態：同樣接受 drop -->
        <div v-else class="wbs-empty-drop"
             @dragover.prevent="treeHighlight=!locked"
             @dragleave="treeHighlight=false"
             @drop="onDropToRoot"
             :class="{'drag-over': treeHighlight}">
          <p>尚無節點，點擊「新增根節點」，或從左側拖曳快速子項至此</p>
        </div>
      </main>

      <!-- 套用模板 Modal -->
      <div class="modal-overlay" v-if="showTemplateModal" @click.self="showTemplateModal=false">
        <div class="modal">
          <h3>選擇模板</h3>
          <div v-for="t in availableTemplates" :key="t.id"
               class="template-option" @click="applyTemplate(t.id)">
            <div class="template-option-name">{{ t.name }}</div>
            <div class="template-option-desc" v-if="t.description">{{ t.description }}</div>
          </div>
          <p v-if="!availableTemplates.length" style="color:#636e72">尚無可用模板</p>
          <div class="modal-actions">
            <button class="btn" @click="showTemplateModal=false">取消</button>
          </div>
        </div>
      </div>

    </div><!-- #app -->
  </div>

  <div th:replace="~{fragments/footer :: footer}"></div>

  <script th:src="@{/js/vue.global.prod.min.js}"></script>
  <script th:src="@{/js/xlsx.min.js}"></script>
  <script th:inline="javascript">
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    const CSRF_TOKEN  = /*[[${_csrf.token}]]*/ '';
    const PROJECT_ID  = /*[[${project.id}]]*/ 0;
    const READ_ONLY   = /*[[${readOnly}]]*/ false;
  </script>
  <script th:src="@{/js/wbs-editor.js}"></script>
</body>
</html>
