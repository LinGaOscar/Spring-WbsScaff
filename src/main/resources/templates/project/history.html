<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
  <meta charset="UTF-8"><title>歷史專案</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <style>
    .project-card { position:relative; opacity:0.85; }
    .archived-badge { font-size:0.72rem; background:#dfe6e9; color:#636e72; border-radius:10px; padding:2px 8px; margin-left:0.5rem; vertical-align:middle; }
    .restore-btn { position:absolute; top:0.6rem; right:0.6rem; padding:0.2rem 0.5rem; font-size:0.75rem; opacity:0; transition:opacity 0.15s; }
    .project-card:hover .restore-btn { opacity:1; }
  </style>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>
  <div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content" id="app">
      <div class="page-header">
        <h2>歷史專案</h2>
      </div>
      <div v-if="error" class="alert alert-error">{{ error }}</div>
      <div class="project-grid" v-if="projects.length">
        <div class="project-card" v-for="p in projects" :key="p.id"
             @click="go(p.id)">
          <div class="project-card-name">
            {{ p.name }}
            <span class="archived-badge">已歸檔</span>
          </div>
          <div class="project-card-meta">
            <span>負責人：{{ p.ownerName }}</span>
            <span v-if="p.departmentName">｜{{ p.departmentName }}</span>
          </div>
          <button v-if="canManage" class="btn btn-sm restore-btn"
                  @click.stop="restore(p)"
                  title="還原為進行中">還原</button>
        </div>
      </div>
      <p v-else style="color:#636e72">尚無歷史專案。</p>
    </main>
  </div>
  <div th:replace="~{fragments/footer :: footer}"></div>

  <script th:src="@{/js/vue.global.prod.min.js}"></script>
  <script th:inline="javascript">
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    const CSRF_TOKEN  = /*[[${_csrf.token}]]*/ '';
  </script>
  <script>
    const { createApp, ref, onMounted } = Vue;
    const h   = () => ({ 'Content-Type': 'application/json', [CSRF_HEADER]: CSRF_TOKEN });
    const api = (url, opt={}) => fetch(url, { headers: h(), ...opt }).then(r => r.json());

    createApp({
      setup() {
        const projects   = ref([]);
        const error      = ref('');
        const canManage  = ref(false);

        async function load() {
          const d = await api('/api/projects?archived=true');
          if (d.success) projects.value = d.data;
          else error.value = d.message;
        }

        function go(id) { window.location.href = `/projects/${id}`; }

        async function restore(p) {
          if (!confirm(`確定還原「${p.name}」為進行中專案？`)) return;
          const d = await api(`/api/projects/${p.id}/unarchive`, { method: 'PATCH' });
          if (d.success) load();
          else error.value = d.message || '還原失敗';
        }

        onMounted(() => {
          load();
          api('/api/users/me').then(d => {
            if (d.success) canManage.value = d.data.canCreateProject;
          }).catch(() => {});
        });

        return { projects, error, canManage, go, restore };
      }
    }).mount('#app');
  </script>
</body>
</html>
