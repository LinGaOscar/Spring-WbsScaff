<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>人員管理</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>
  <div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content" id="app">
      <div class="page-header">
        <h2>人員管理</h2>
        <button class="btn btn-primary" style="width:auto" @click="openCreate">+ 新增人員</button>
      </div>
      <div v-if="error" class="alert alert-error">{{ error }}</div>

      <table class="data-table" v-if="users.length">
        <thead>
          <tr>
            <th>姓名</th><th>電子郵件</th><th>部門</th><th>角色</th><th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="u in users" :key="u.id">
            <td>{{ u.displayName }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.departmentName || '-' }}</td>
            <td>{{ roleLabel(u.role) }}</td>
            <td>
              <button class="btn btn-sm" @click="openEdit(u)">編輯</button>
              <button class="btn btn-sm btn-danger" @click="disable(u)">停用</button>
            </td>
          </tr>
        </tbody>
      </table>
      <p v-else style="color:#636e72">尚無人員資料。</p>

      <!-- 新增 / 編輯 modal -->
      <div v-if="modal.open" class="modal-overlay" @click.self="closeModal">
        <div class="modal">
          <h3>{{ modal.isEdit ? '編輯人員' : '新增人員' }}</h3>
          <div class="form-group">
            <label>電子郵件</label>
            <input v-model="modal.form.email" type="email" :disabled="modal.isEdit">
          </div>
          <div class="form-group" v-if="!modal.isEdit">
            <label>密碼</label>
            <input v-model="modal.form.password" type="password" placeholder="至少 6 碼">
          </div>
          <div class="form-group">
            <label>姓名</label>
            <input v-model="modal.form.displayName">
          </div>
          <div class="form-group">
            <label>部門</label>
            <select v-model="modal.form.departmentId">
              <option :value="null">— 無部門 —</option>
              <option v-for="d in departments" :key="d.id" :value="d.id">{{ d.name }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>角色</label>
            <select v-model="modal.form.role">
              <option value="DIRECTOR">部長</option>
              <option value="SECTION_CHIEF">科長</option>
              <option value="PROJECT_LEADER">專案 Leader</option>
              <option value="PROJECT_MEMBER">專案成員</option>
            </select>
          </div>
          <div class="modal-actions">
            <button class="btn btn-primary" style="width:auto" @click="submit">確認</button>
            <button class="btn" @click="closeModal">取消</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div th:replace="~{fragments/footer :: footer}"></div>

  <script th:src="@{/js/vue.global.prod.min.js}"></script>
  <script th:inline="javascript">
    const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    const CSRF_TOKEN  = /*[[${_csrf.token}]]*/ '';
  </script>
  <script>
    const { createApp, ref, onMounted } = Vue;
    const h   = () => ({ 'Content-Type': 'application/json', [CSRF_HEADER]: CSRF_TOKEN });
    const api = (url, opt={}) => fetch(url, { headers: h(), ...opt }).then(r => r.json());

    const ROLE_LABELS = {
      DIRECTOR: '部長', SECTION_CHIEF: '科長',
      PROJECT_LEADER: '專案 Leader', PROJECT_MEMBER: '專案成員'
    };

    createApp({
      setup() {
        const users       = ref([]);
        const departments = ref([]);
        const error       = ref('');
        const modal       = ref({ open: false, isEdit: false, editId: null, form: {} });

        const roleLabel = (r) => ROLE_LABELS[r] || r;

        async function load() {
          const [ud, dd] = await Promise.all([api('/api/users'), api('/api/departments')]);
          if (ud.success) users.value = ud.data;
          if (dd.success) departments.value = dd.data;
        }

        function openCreate() {
          error.value = '';
          modal.value = { open: true, isEdit: false, editId: null,
            form: { email: '', password: '', displayName: '', departmentId: null, role: 'PROJECT_MEMBER' } };
        }

        function openEdit(u) {
          error.value = '';
          const dept = departments.value.find(d => d.name === u.departmentName);
          modal.value = { open: true, isEdit: true, editId: u.id,
            form: { displayName: u.displayName, departmentId: dept?.id ?? null, role: u.role } };
        }

        function closeModal() { modal.value.open = false; }

        async function submit() {
          const { isEdit, editId, form } = modal.value;
          const d = await api(isEdit ? `/api/users/${editId}` : '/api/users', {
            method: isEdit ? 'PUT' : 'POST', body: JSON.stringify(form)
          });
          if (d.success) { closeModal(); load(); }
          else error.value = d.message || '操作失敗';
        }

        async function disable(u) {
          if (!confirm(`確定停用「${u.displayName}」？停用後無法登入。`)) return;
          const d = await api(`/api/users/${u.id}`, { method: 'DELETE' });
          if (d.success) load();
          else error.value = d.message || '停用失敗';
        }

        onMounted(load);
        return { users, departments, error, modal, roleLabel,
                 openCreate, openEdit, closeModal, submit, disable };
      }
    }).mount('#app');
  </script>
</body>
</html>
