version: '3.8'
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Express"
    volumes:
      - mssqldata:/var/opt/mssql
      - ./db/mssql:/init
    entrypoint: /bin/bash /init/entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    ports:
      - "1433:1433"

volumes:
  mssqldata:
