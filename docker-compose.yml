version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wbsscaff
      POSTGRES_USER: wbsscaff
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wbsscaff"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pgdata:
